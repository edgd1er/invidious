name: Build and release container

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            name: "AMD64"
            dockerfile: "docker/Dockerfile"
            tag_suffix: ""
            # GitHub doesn't have a ubuntu-latest-arm runner
          - os: ubuntu-24.04-arm
            platform: linux/arm64/v8
            name: "ARM64"
            dockerfile: "docker/Dockerfile"
            tag_suffix: "-arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: quay.io/invidious/invidious
          flavor: |
            latest=false
            suffix=${{ matrix.tag_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            quay.expires-after=12w

      - name: Build and push Docker ${{ matrix.name }} image for Push Event
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: false
          build-args: |
            "release=1"
            "CRMAINTAINER=84codes"

  combine-multiarch-images:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      # https://github.com/marketplace/actions/docker-manifest-create-action
      - name: Create and push manifest
        uses: int128/docker-manifest-create-action@v2.22.0
        with:
          push: false
          tags: quay.io/invidious/invidious:latest
          sources: |
            quay.io/invidious/invidious:latest
            quay.io/invidious/invidious:latest-arm64
