name: Build and release container directly from master

on:
  push:
    branches:
      - "master"
    paths-ignore:
      - "*.md"
      - LICENCE
      - TRANSLATION
      - invidious.service
      - .git*
      - .editorconfig
      - screenshots/*
      - .github/ISSUE_TEMPLATE/*
      - kubernetes/**

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            name: "AMD64"
            dockerfile: "docker/Dockerfile"
            tag_suffix: ""
            # GitHub doesn't have a ubuntu-latest-arm runner
          - os: ubuntu-24.04-arm
            platform: linux/arm64/v8
            name: "ARM64"
            dockerfile: "docker/Dockerfile"
            tag_suffix: "-arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        if: true == false
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: quay.io/invidious/invidious
          flavor: |
            suffix=${{ matrix.tag_suffix }}
          tags: |
            type=sha,format=short,prefix={{date 'YYYY.MM.DD'}}-,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=raw,value=master,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
          labels: |
            quay.expires-after=12w

      - name: Build and push Docker ${{ matrix.name }} image for Push Event
        uses: docker/build-push-action@v7
        with:
          context: .
          file: "${{ matrix.dockerfile }}"
          platforms: "${{ matrix.platform }}"
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: false
          build-args: |
            "release=1"
            "CRMAINTAINER=84codes"

  combine-multiarch-images:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Login to registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # https://github.com/marketplace/actions/docker-manifest-create-action
      - name: Create and push manifest
        uses: int128/docker-manifest-create-action@v2
        with:
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/invidious:master
          sources: |
            ${{ secrets.DOCKER_USERNAME }}/invidious:master
            ${{ secrets.DOCKER_USERNAME }}/invidious:master-arm64
